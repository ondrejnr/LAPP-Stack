apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lapp-chart.fullname" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lapp-app
  template:
    metadata:
      labels:
        app: lapp-app
    spec:
      containers:
        # Container 1: PHP-FPM
        - name: php
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 9000
        
        # Container 2: Nginx Sidecar
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "lapp-chart.fullname" . }}-nginx-config
