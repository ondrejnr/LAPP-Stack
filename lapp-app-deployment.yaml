apiVersion: apps/v1
kind: Deployment
metadata:
  name: lapp-app
  namespace: lapp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lapp-app
  template:
    metadata:
      labels:
        app: lapp-app
    spec:
      containers:
      - name: php-app
        image: ondrejnr1/lapp-php-app:latest
        ports:
        - containerPort: 80
        env:
        - name: DB_HOST
          value: "lapp-db-rw.lapp-system.svc.cluster.local"
        - name: DB_NAME
          value: "app"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: lapp-db-app
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lapp-db-app
              key: password
---
apiVersion: v1
kind: Service
metadata:
  name: lapp-service
  namespace: lapp-system
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: lapp-app
