apiVersion: apps/v1
kind: Deployment
metadata:
  name: lapp-app
  namespace: lapp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lapp-app
  template:
    metadata:
      labels:
        app: lapp-app
    spec:
      # This copies your code to the shared volume at startup
      initContainers:
      - name: install-code
        image: ondrejnr1/lapp-php-app:latest
        command: ["cp", "-r", "/var/www/html/.", "/shared-html/"]
        volumeMounts:
        - name: app-volume
          mountPath: /shared-html
      containers:
      - name: php-app
        image: ondrejnr1/lapp-php-app:latest
        volumeMounts:
        - name: app-volume
          mountPath: /var/www/html
        env:
        - name: DB_HOST
          value: "lapp-db-rw.lapp-system.svc.cluster.local"
        - name: DB_NAME
          value: "app"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: lapp-db-app
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lapp-db-app
              key: password
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: app-volume
          mountPath: /var/www/html
        - name: config-volume
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: app-volume
        emptyDir: {}
      - name: config-volume
        configMap:
          name: nginx-config
