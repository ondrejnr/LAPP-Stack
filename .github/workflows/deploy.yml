name: LAPP Glasskube Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./php-app
          file: ./php-app/Dockerfile
          push: true
          tags: ondrejnr1/lapp-php-app:latest

      # This is the "Magic" step that provides the plugin kubectl is looking for
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Set up Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy App
        run: |
          # We use --validate=false to skip the network check that failed
          kubectl apply --validate=false -f - <<K8S
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: php-app
            namespace: lapp-production
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: php-app
            template:
              metadata:
                labels:
                  app: php-app
              spec:
                containers:
                - name: php-app
                  image: ondrejnr1/lapp-php-app:latest
                  ports:
                  - containerPort: 80
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: php-app-service
            namespace: lapp-production
          spec:
            type: LoadBalancer
            selector:
              app: php-app
            ports:
            - protocol: TCP
              port: 80
              targetPort: 80
          K8S
