name: Deploy LAPP Stack

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ondrejnr1/lapp-php-app:latest

    - name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: 'Set up GKE credentials'
      uses: 'google-github-actions/get-gke-credentials@v2'
      with:
        cluster_name: 'tech-stack-cluster'
        location: 'europe-west3-c'

    - name: Install Helm
      uses: azure/setup-helm@v3

    - name: Deploy with Helm
      run: |
        # Helm will now use the automatic auth from the step above
        # No more manual 'echo KUBECONFIG' needed!
        helm upgrade --install lapp-release ./lapp-chart \
          --namespace lapp-system \
          --create-namespace \
          --set image.repository=ondrejnr1/lapp-php-app \
          --set image.tag=latest \
          --wait
