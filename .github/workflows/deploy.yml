name: LAPP Pipeline
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./php-app
          push: true
          tags: yourusername/lapp-php:latest
      - name: Deploy via Helm
        run: |
          # This part assumes you add a KUBECONFIG secret to GitHub
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          helm upgrade --install lapp-release ./lapp-chart --namespace kafka-web --set image.repository=yourusername/lapp-php
