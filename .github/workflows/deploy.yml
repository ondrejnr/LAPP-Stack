name: LAPP Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./php-app
          push: true
          tags: |
            docker.io/ondrejnr1/lapp-php:latest
            docker.io/ondrejnr1/lapp-php:${{ github.run_number }}

      - name: Deploy via Helm
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          helm upgrade --install lapp-release ./lapp-chart \
            --namespace kafka-web \
            --set image.repository=docker.io/ondrejnr1/lapp-php \
            --set image.tag=${{ github.run_number }} \
            --wait
