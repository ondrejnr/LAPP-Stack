apiVersion: v1
kind: ConfigMap
metadata:
  name: building-seed-script
  namespace: lapp-production
data:
  building_seed.sql: |-
    # Paste content of building_seed.sql here (or re-cat if not editing)
DROP TABLE IF EXISTS buildings CASCADE;
CREATE TABLE buildings (
  id SERIAL PRIMARY KEY,
  name TEXT,
  address TEXT,
  postcode TEXT,
  latitude NUMERIC(8,5),
  longitude NUMERIC(8,5),
  provider TEXT,
  built_year INT,
  notes TEXT
);

INSERT INTO buildings (name, address, postcode, latitude, longitude, provider, built_year, notes)
SELECT
  'Block ' || chr(65 + (i%26)),
  (100 + i) || ' Example Rd',
  'PC' || (1000 + i)::text,
  51.45 + (random()*2),
  -0.2 + random(),
  providers[(random()*6+1)::int],
  1960 + (random()*60)::int,
  notes[(random()*4+1)::int]
FROM generate_series(1,200) i,
  (SELECT ARRAY['Acme Housing','Northern Homes','Council North','Southern Trust','Welsh Homes','Scotia Assoc.','WM Trust'] AS providers) p,
  (SELECT ARRAY['','Flagship','Tower','Refurbished','Accessible'] AS notes) n;
